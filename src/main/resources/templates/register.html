<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Employee Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .card{
            width:500px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
            border-radius:20px 20px 0 0;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .icon{
            font-size:50px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="card-header">

        <div class="icon">👨‍💼</div>

        <h2>Employee Registration</h2>

        <p class="mb-0">
            Add employee details
        </p>

    </div>

    <div class="card-body p-4">

        <form th:action="@{/employees/save}"
              th:object="${employee}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    First Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{firstName}"
                       placeholder="Enter First Name"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Last Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{lastName}"
                       placeholder="Enter Last Name"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-custom">
                Save Employee
            </button>

        </form>

    </div>

</div>

</body>
</html>
